<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たべもの たんけんたい 🍎</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(160deg, #FFF5E0 0%, #E8FFF5 50%, #FFF0F8 100%);
      min-height: 100vh;
    }

    /* ヘッダー */
    .child-header {
      background: linear-gradient(135deg, #FF6B35 0%, #FFB347 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(255,107,53,0.3);
    }

    .child-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .child-avatar-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 3px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .child-name-display {
      color: white;
      font-size: 1.2rem;
      font-weight: 900;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    }

    .child-name-sub {
      color: rgba(255,255,255,0.85);
      font-size: 0.8rem;
      font-weight: 500;
    }

    /* ようこそメッセージ */
    .welcome-section {
      text-align: center;
      padding: 28px 20px 16px;
    }

    .welcome-title {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 900;
      color: var(--primary);
      text-shadow: 2px 2px 0 #FFD4B8;
      margin-bottom: 8px;
    }

    .welcome-sub {
      font-size: 1rem;
      color: var(--text-mid);
      font-weight: 500;
    }

    /* 今日のスタンプ */
    .stamp-section {
      max-width: 700px;
      margin: 0 auto 24px;
      padding: 0 16px;
    }

    .stamp-card {
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .stamp-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 14px;
    }

    .stamp-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stamp-item {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      border: 3px dashed #E8DDD8;
      transition: all 0.3s;
    }

    .stamp-item.stamped {
      border-color: var(--primary);
      background: #FFF3EC;
      border-style: solid;
      animation: bounce 0.4s ease;
    }

    /* メインメニュー */
    .menu-section {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 16px 24px;
    }

    .menu-title {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--text-dark);
      margin-bottom: 16px;
      text-align: center;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .menu-btn {
      border: none;
      border-radius: 28px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .menu-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .menu-btn:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 32px rgba(0,0,0,0.16);
    }

    .menu-btn:hover::after { opacity: 1; }

    .menu-btn:active { transform: translateY(-2px) scale(1.01); }

    .btn-food { background: linear-gradient(135deg, #FF8C69, #FFB347); }
    .btn-pron { background: linear-gradient(135deg, #4ECDC4, #6BE0D8); }
    .btn-quiz { background: linear-gradient(135deg, #A8E063, #6DD47E); }
    .btn-badge { background: linear-gradient(135deg, #C39BD3, #D7BFE8); }

    .menu-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 12px;
      line-height: 1;
    }

    .menu-label {
      font-size: 1.1rem;
      font-weight: 900;
      color: white;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
      display: block;
    }

    .menu-sublabel {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
      margin-top: 4px;
      display: block;
    }

    /* コンテンツパネル */
    .content-panel {
      max-width: 700px;
      margin: 0 auto 24px;
      padding: 0 16px;
    }

    /* 食の学習 */
    .food-items {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .food-item {
      background: white;
      border-radius: 20px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border: 3px solid transparent;
    }

    .food-item:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .food-item.learned {
      border-color: var(--accent);
      background: #F5FFF0;
    }

    .food-emoji { font-size: 2.8rem; margin-bottom: 8px; display: block; }
    .food-name { font-size: 0.9rem; font-weight: 700; color: var(--text-dark); }
    .food-group { font-size: 0.72rem; color: var(--text-light); margin-top: 4px; }

    /* 食の詳細モーダル */
    .food-detail-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      backdrop-filter: blur(4px);
    }

    .food-detail-box {
      background: white;
      border-radius: var(--radius);
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.3s ease;
      position: relative;
    }

    .food-detail-emoji { font-size: 5rem; margin-bottom: 16px; display: block; }
    .food-detail-name { font-size: 2rem; font-weight: 900; color: var(--text-dark); margin-bottom: 8px; }
    .food-detail-desc { color: var(--text-mid); font-size: 0.95rem; line-height: 1.7; margin-bottom: 20px; }
    .food-detail-good { background: #F0FFF0; border-radius: 14px; padding: 14px; font-size: 0.9rem; color: #2E8B57; font-weight: 600; margin-bottom: 20px; }

    /* はやくちことば */
    .pron-card {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 16px;
    }

    .pron-text {
      font-size: clamp(1.3rem, 5vw, 2rem);
      font-weight: 900;
      color: var(--text-dark);
      line-height: 1.6;
      margin: 20px 0;
      letter-spacing: 0.1em;
    }

    .pron-btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* クイズ */
    .quiz-question {
      background: white;
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 16px;
    }

    .quiz-q-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 20px 0;
      line-height: 1.6;
    }

    .quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .quiz-option-btn {
      padding: 18px 12px;
      border-radius: 16px;
      border: 3px solid #E8DDD8;
      background: white;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quiz-option-btn:hover { border-color: var(--primary); background: #FFF8F0; transform: scale(1.03); }
    .quiz-option-btn.correct { border-color: #27AE60; background: #E8FFE8; color: #27AE60; }
    .quiz-option-btn.wrong { border-color: #E74C3C; background: #FFE8E8; color: #E74C3C; }

    /* バッジ */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .badge-item {
      background: white;
      border-radius: 20px;
      padding: 20px 12px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .badge-emoji { font-size: 2.5rem; margin-bottom: 8px; display: block; }
    .badge-name { font-size: 0.82rem; font-weight: 700; color: var(--text-dark); }
    .badge-status { font-size: 0.72rem; margin-top: 4px; }
    .badge-status.locked { color: var(--text-light); }
    .badge-status.unlocked { color: #27AE60; font-weight: 700; }

    /* 結果バナー */
    .result-banner {
      background: linear-gradient(135deg, var(--accent), #6DD47E);
      color: white;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
      font-size: 1.2rem;
      font-weight: 900;
      display: none;
    }

    .close-panel-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 14px;
      background: white;
      border: 2px solid var(--primary);
      border-radius: 50px;
      color: var(--primary);
      font-family: inherit;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
    }
    .close-panel-btn:hover { background: var(--primary); color: white; }

    @media (max-width: 480px) {
      .menu-grid { grid-template-columns: 1fr 1fr; }
      .food-items { grid-template-columns: repeat(2, 1fr); }
      .badge-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- ローディング -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-spinner"></div>
  <p class="loading-text">よみこみちゅう...</p>
</div>

<!-- ヘッダー -->
<header class="child-header">
  <div class="child-header-left">
    <div class="child-avatar-circle" id="headerAvatar">🐻</div>
    <div>
      <div class="child-name-display" id="headerName">ロードちゅう</div>
      <div class="child-name-sub">たべものたんけんたい</div>
    </div>
  </div>
  <button class="btn-logout" onclick="App.logout()">ログアウト</button>
</header>

<!-- ようこそ -->
<section class="welcome-section">
  <div class="welcome-title" id="welcomeTitle">こんにちは！</div>
  <p class="welcome-sub">きょうも いっしょに がんばろう 🌟</p>
</section>

<!-- スタンプカード -->
<div class="stamp-section">
  <div class="stamp-card">
    <div class="stamp-title">🎫 きょうのスタンプ</div>
    <div class="stamp-row" id="stampRow">
      <div class="stamp-item" data-stamp="0">⭐</div>
      <div class="stamp-item" data-stamp="1">⭐</div>
      <div class="stamp-item" data-stamp="2">⭐</div>
      <div class="stamp-item" data-stamp="3">⭐</div>
      <div class="stamp-item" data-stamp="4">⭐</div>
    </div>
  </div>
</div>

<!-- メインメニュー -->
<div class="menu-section" id="mainMenu">
  <p class="menu-title">なにを する？</p>
  <div class="menu-grid">
    <button class="menu-btn btn-food" onclick="showPanel('food')">
      <span class="menu-icon">🥦</span>
      <span class="menu-label">たべもの まなぼう</span>
      <span class="menu-sublabel">やさいや くだものを しろう</span>
    </button>
    <button class="menu-btn btn-pron" onclick="showPanel('pron')">
      <span class="menu-icon">🎤</span>
      <span class="menu-label">はやくちことば</span>
      <span class="menu-sublabel">くちを げんきに しよう</span>
    </button>
    <button class="menu-btn btn-quiz" onclick="showPanel('quiz')">
      <span class="menu-icon">❓</span>
      <span class="menu-label">クイズに ちょうせん</span>
      <span class="menu-sublabel">なにもんだい かな？</span>
    </button>
    <button class="menu-btn btn-badge" onclick="showPanel('badge')">
      <span class="menu-icon">🏅</span>
      <span class="menu-label">わたしの バッジ</span>
      <span class="menu-sublabel">たっせいを みてみよう</span>
    </button>
  </div>
</div>

<!-- ===== パネル: たべもの ===== -->
<div class="content-panel hidden" id="foodPanel">
  <div class="section-title">🥦 たべものを まなぼう</div>
  <div class="food-items" id="foodItemsGrid"></div>
  <button class="close-panel-btn" onclick="closePanel()">← メニューに もどる</button>
</div>

<!-- 食詳細モーダル -->
<div id="foodDetailModal" class="food-detail-modal hidden">
  <div class="food-detail-box">
    <button style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-light);"
            onclick="document.getElementById('foodDetailModal').classList.add('hidden')">✕</button>
    <span class="food-detail-emoji" id="fdEmoji">🍎</span>
    <div class="food-detail-name" id="fdName">りんご</div>
    <div class="food-detail-desc" id="fdDesc">あかくて あまい くだものです。</div>
    <div class="food-detail-good" id="fdGood">💪 からだに いいこと</div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn btn-primary" onclick="learnedThisFood()">✅ べんきょうした！</button>
      <button class="btn btn-outline" onclick="document.getElementById('foodDetailModal').classList.add('hidden')">とじる</button>
    </div>
  </div>
</div>

<!-- ===== パネル: はやくちことば ===== -->
<div class="content-panel hidden" id="pronPanel">
  <div class="section-title">🎤 はやくちことばに チャレンジ！</div>
  <div class="pron-card">
    <p style="color:var(--text-light);font-size:0.9rem;">📖 このことばを いってみよう</p>
    <div class="pron-text" id="pronText">---</div>
    <p style="color:var(--text-light);font-size:0.8rem;margin-bottom:16px;">⬆ 3かいいってみよう！</p>
    <div class="pron-btn-row">
      <button class="btn btn-secondary" onclick="nextPron()">つぎの ことば ➡</button>
      <button class="btn btn-accent" onclick="clearPron()">さいしょから</button>
    </div>
  </div>
  <div class="result-banner" id="pronResult">🎉 じょうず！ スタンプを ゲット！</div>
  <div style="background:white;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center;">
    <p style="font-weight:700;margin-bottom:12px;color:var(--text-dark);">
      <span id="pronIdx">1</span> / <span id="pronTotal">?</span> ことば
    </p>
    <div class="progress-bar">
      <div class="progress-fill" id="pronProgress" style="width:10%"></div>
    </div>
    <button class="btn btn-primary" style="margin-top:16px;" onclick="completePron()">
      ✅ できた！
    </button>
  </div>
  <button class="close-panel-btn" onclick="closePanel()">← メニューに もどる</button>
</div>

<!-- ===== パネル: クイズ ===== -->
<div class="content-panel hidden" id="quizPanel">
  <div class="section-title">❓ たべものクイズ！</div>
  <div class="quiz-question" id="quizBox">
    <p id="quizQNum" style="color:var(--text-light);font-size:0.9rem;"></p>
    <div id="quizQImg" style="font-size:4rem;margin:10px 0;"></div>
    <div class="quiz-q-text" id="quizQText"></div>
    <div class="quiz-options" id="quizOptions"></div>
  </div>
  <div class="result-banner" id="quizResult"></div>
  <button class="close-panel-btn" onclick="closePanel()">← メニューに もどる</button>
</div>

<!-- ===== パネル: バッジ ===== -->
<div class="content-panel hidden" id="badgePanel">
  <div class="section-title">🏅 わたしの バッジ</div>
  <div class="badge-grid" id="badgeGrid"></div>
  <button class="close-panel-btn" onclick="closePanel()">← メニューに もどる</button>
</div>

<script src="js/app.js"></script>
<script>
// ===== データ =====
const FOODS = [
  { emoji:'🍎', name:'りんご', group:'くだもの', desc:'あかくて あまい くだものです。かめば かむほど おいしくなるよ！', good:'ビタミンが たっぷり！かぜを ひきにくく なるよ'},
  { emoji:'🥦', name:'ブロッコリー', group:'やさい', desc:'みどりいろの おはなのような やさいです。', good:'カルシウムが いっぱい！ほねを つよく するよ'},
  { emoji:'🍊', name:'みかん', group:'くだもの', desc:'ぺろっと かわを むいて たべる あまい くだものだよ。', good:'ビタミンCが いっぱい！はだを きれいにするよ'},
  { emoji:'🥕', name:'にんじん', group:'やさい', desc:'おれんじいろの ながい やさいです。ウサギさんも だいすき！', good:'めに いいビタミンが たっぷり！'},
  { emoji:'🍇', name:'ぶどう', group:'くだもの', desc:'むらさきや みどりの ちいさな つぶが あつまっているよ。', good:'つかれを とってくれるよ！'},
  { emoji:'🌽', name:'とうもろこし', group:'やさい', desc:'きいろいつぶが ならんだ やさいです。あまくておいしいよ！', good:'エネルギーに なるよ！はしって あそべるよ'},
  { emoji:'🍓', name:'いちご', group:'くだもの', desc:'あかくて ハートのかたちの くだものだよ。', good:'ビタミンCが たくさん！げんきに なれるよ'},
  { emoji:'🥬', name:'キャベツ', group:'やさい', desc:'まるくて おおきな みどりの やさいです。', good:'おなかに やさしいよ！'},
  { emoji:'🍋', name:'レモン', group:'くだもの', desc:'きいろくて すっぱい くだものです。', good:'ビタミンが たっぷり！からだを まもってくれるよ'},
];

const PRON_LIST = [
  '🍎 あかい りんご あまい りんご',
  '🐱 ネコが なく にわ にぎやか にわ',
  '🎤 かっかって かわかして かっかって かわかして',
  '🐛 なまむぎ なまごめ なまたまご',
  '🐎 となりの きゃくは よく かき くう きゃく',
  '🍡 すもも も もも も もも の うち',
  '🚌 バスガス ばくはつ',
  '🐢 うさぎ うさぎ なに みて はねる',
];

const QUIZ_LIST = [
  { img:'🥦', q:'これは なに？', opts:['ブロッコリー','キャベツ','レタス','ほうれんそう'], ans:0 },
  { img:'🍎', q:'りんごは なにいろ？', opts:['あおい','きいろい','あかい','むらさき'], ans:2 },
  { img:'🥕', q:'ウサギさんが だいすきな やさいは？', opts:['なす','にんじん','ピーマン','ねぎ'], ans:1 },
  { img:'🍊', q:'みかんは どの なかまかな？', opts:['やさい','くだもの','おにく','さかな'], ans:1 },
  { img:'🌽', q:'とうもろこしの いろは？', opts:['あかい','みどり','きいろ','しろい'], ans:2 },
  { img:'🍓', q:'ハートのかたちの くだもの は？', opts:['みかん','ぶどう','いちご','りんご'], ans:2 },
];

// ===== 状態 =====
let session = null;
let learnedFoods = new Set();
let currentPronIdx = 0;
let currentQuizIdx = 0;
let quizScore = 0;
let stampsToday = 0;

// ===== 初期化 =====
async function init() {
  session = App.requireAuth(['child']);
  if (!session) return;

  document.getElementById('headerAvatar').textContent = App.getAvatar(session.avatar);
  document.getElementById('headerName').textContent = `${session.name}ちゃん`;
  document.getElementById('welcomeTitle').textContent = `${session.name}ちゃん、こんにちは！`;

  // ローカルストレージからスタンプ読み込み
  const todayKey = `stamps_${session.id}_${new Date().toDateString()}`;
  stampsToday = parseInt(localStorage.getItem(todayKey) || '0');
  renderStamps();

  // 食の学習済み
  const learnedKey = `learned_${session.id}`;
  const saved = localStorage.getItem(learnedKey);
  if (saved) learnedFoods = new Set(JSON.parse(saved));

  renderFoods();
  renderBadges();
  initQuiz();
  initPron();
}

// ===== スタンプ =====
function renderStamps() {
  const stamps = document.querySelectorAll('.stamp-item');
  stamps.forEach((s, i) => {
    if (i < stampsToday) s.classList.add('stamped');
    else s.classList.remove('stamped');
  });
}

function addStamp() {
  if (stampsToday >= 5) return;
  stampsToday++;
  const todayKey = `stamps_${session.id}_${new Date().toDateString()}`;
  localStorage.setItem(todayKey, String(stampsToday));
  renderStamps();
  const stamps = document.querySelectorAll('.stamp-item');
  if (stamps[stampsToday-1]) stamps[stampsToday-1].classList.add('bounce');
}

// ===== パネル切り替え =====
function showPanel(type) {
  document.getElementById('mainMenu').classList.add('hidden');
  ['food','pron','quiz','badge'].forEach(p => {
    document.getElementById(`${p}Panel`).classList.add('hidden');
  });
  document.getElementById(`${type}Panel`).classList.remove('hidden');
  document.getElementById(`${type}Panel`).classList.add('fade-in');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closePanel() {
  ['food','pron','quiz','badge'].forEach(p => {
    document.getElementById(`${p}Panel`).classList.add('hidden');
  });
  document.getElementById('mainMenu').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 食の学習 =====
function renderFoods() {
  const grid = document.getElementById('foodItemsGrid');
  grid.innerHTML = FOODS.map((f, i) => `
    <div class="food-item ${learnedFoods.has(i) ? 'learned' : ''}"
         onclick="showFoodDetail(${i})">
      ${learnedFoods.has(i) ? '<div style="font-size:0.7rem;color:#27AE60;font-weight:700;margin-bottom:4px;">✅ べんきょうずみ</div>' : ''}
      <span class="food-emoji">${f.emoji}</span>
      <div class="food-name">${f.name}</div>
      <div class="food-group">${f.group}</div>
    </div>
  `).join('');
}

let currentFoodIdx = -1;

function showFoodDetail(idx) {
  currentFoodIdx = idx;
  const f = FOODS[idx];
  document.getElementById('fdEmoji').textContent = f.emoji;
  document.getElementById('fdName').textContent = f.name;
  document.getElementById('fdDesc').textContent = f.desc;
  document.getElementById('fdGood').textContent = `💪 ${f.good}`;
  document.getElementById('foodDetailModal').classList.remove('hidden');
}

async function learnedThisFood() {
  learnedFoods.add(currentFoodIdx);
  const learnedKey = `learned_${session.id}`;
  localStorage.setItem(learnedKey, JSON.stringify([...learnedFoods]));
  document.getElementById('foodDetailModal').classList.add('hidden');
  renderFoods();
  addStamp();
  App.showToast('🌟 べんきょうした！スタンプゲット！', 'success');

  // ログ記録
  try {
    await App.logActivity({
      user_id: session.id,
      child_name: session.name,
      activity_type: 'food_study',
      score: Math.round((learnedFoods.size / FOODS.length) * 100),
      completed: true,
      details: FOODS[currentFoodIdx].name,
    });
  } catch(e) {}
}

// ===== はやくちことば =====
function initPron() {
  currentPronIdx = 0;
  renderPron();
}

function renderPron() {
  document.getElementById('pronText').textContent = PRON_LIST[currentPronIdx];
  document.getElementById('pronIdx').textContent = currentPronIdx + 1;
  document.getElementById('pronTotal').textContent = PRON_LIST.length;
  document.getElementById('pronProgress').style.width =
    `${((currentPronIdx + 1) / PRON_LIST.length) * 100}%`;
  document.getElementById('pronResult').style.display = 'none';
}

function nextPron() {
  if (currentPronIdx < PRON_LIST.length - 1) {
    currentPronIdx++;
    renderPron();
  } else {
    App.showToast('🎉 ぜんぶ おわったよ！', 'success');
  }
}

function clearPron() {
  currentPronIdx = 0;
  renderPron();
}

async function completePron() {
  const result = document.getElementById('pronResult');
  result.style.display = 'block';
  result.textContent = '🎉 じょうず！ スタンプを ゲット！';
  addStamp();

  try {
    await App.logActivity({
      user_id: session.id,
      child_name: session.name,
      activity_type: 'pronunciation',
      score: Math.round(((currentPronIdx + 1) / PRON_LIST.length) * 100),
      completed: currentPronIdx === PRON_LIST.length - 1,
      details: `はやくちことば レベル${currentPronIdx + 1}`,
    });
  } catch(e) {}
}

// ===== クイズ =====
function initQuiz() {
  currentQuizIdx = 0;
  quizScore = 0;
  renderQuiz();
}

function renderQuiz() {
  const q = QUIZ_LIST[currentQuizIdx];
  document.getElementById('quizQNum').textContent =
    `もんだい ${currentQuizIdx + 1} / ${QUIZ_LIST.length}`;
  document.getElementById('quizQImg').textContent = q.img;
  document.getElementById('quizQText').textContent = q.q;
  document.getElementById('quizResult').style.display = 'none';

  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) => `
    <button class="quiz-option-btn" onclick="answerQuiz(${i})">
      ${o}
    </button>
  `).join('');
}

async function answerQuiz(idx) {
  const q = QUIZ_LIST[currentQuizIdx];
  const btns = document.querySelectorAll('.quiz-option-btn');
  btns.forEach(b => b.disabled = true);

  if (idx === q.ans) {
    btns[idx].classList.add('correct');
    quizScore++;
    App.showToast('🎉 せいかい！', 'success');
  } else {
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    App.showToast('😢 ざんねん...', 'error');
  }

  await new Promise(r => setTimeout(r, 1200));

  if (currentQuizIdx < QUIZ_LIST.length - 1) {
    currentQuizIdx++;
    renderQuiz();
  } else {
    // 終了
    const result = document.getElementById('quizResult');
    result.style.display = 'block';
    result.textContent = `🏆 ぜんもんだい おわり！${quizScore}/${QUIZ_LIST.length} せいかい！`;
    document.getElementById('quizOptions').innerHTML =
      `<button class="btn btn-primary" style="grid-column:1/-1;" onclick="initQuiz()">もういちど チャレンジ！</button>`;
    addStamp();

    try {
      await App.logActivity({
        user_id: session.id,
        child_name: session.name,
        activity_type: 'quiz',
        score: Math.round((quizScore / QUIZ_LIST.length) * 100),
        completed: true,
        details: `クイズ ${quizScore}/${QUIZ_LIST.length} せいかい`,
      });
    } catch(e) {}
  }
}

// ===== バッジ =====
function renderBadges() {
  const badges = [
    { emoji:'🥦', name:'やさいはかせ', cond: learnedFoods.size >= 3, condText:'やさい3つ まなぼう' },
    { emoji:'🎤', name:'はやくちおうじ', cond: stampsToday >= 2, condText:'れんしゅう2かい しよう' },
    { emoji:'❓', name:'クイズキング', cond: false, condText:'クイズを クリアしよう' },
    { emoji:'⭐', name:'まいにちスター', cond: stampsToday >= 5, condText:'スタンプ5こ あつめよう' },
    { emoji:'🍎', name:'くだものスター', cond: learnedFoods.size >= 5, condText:'くだもの5つ まなぼう' },
    { emoji:'🏆', name:'たんけんたいちょう', cond: learnedFoods.size >= FOODS.length, condText:'ぜんぶ まなもう' },
  ];

  const grid = document.getElementById('badgeGrid');
  grid.innerHTML = badges.map(b => `
    <div class="badge-item" style="${b.cond ? '' : 'opacity:0.5;'}">
      <span class="badge-emoji" style="${b.cond ? '' : 'filter:grayscale(1);'}">${b.emoji}</span>
      <div class="badge-name">${b.name}</div>
      <div class="badge-status ${b.cond ? 'unlocked' : 'locked'}">
        ${b.cond ? '🎉 かくとく！' : b.condText}
      </div>
    </div>
  `).join('');
}

init();
</script>
